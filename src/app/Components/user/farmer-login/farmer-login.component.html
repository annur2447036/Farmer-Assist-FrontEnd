<div class="login-wrapper d-flex justify-content-center align-items-center min-vh-100">

  <div class="card login-card shadow-lg border-0">

    <div class="card-body p-4">

      <h3 class="text-center mb-4 fw-bold login-title">🔐 Login</h3>

      <div *ngIf="message" class="alert alert-danger text-center fade-in">
        {{ message }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email"
               [(ngModel)]="loginRequest.email"
               class="form-control input-style"
               placeholder="Enter your email" />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password"
               [(ngModel)]="loginRequest.password"
               class="form-control input-style"
               placeholder="Enter your password" />
      </div>

      <button (click)="login()" class="btn login-btn w-100">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
      </button>

      <div class="text-center mt-3">
        <span>New user?</span>
      </div>

      <div class="text-center mt-2">
        <a routerLink="/farmer-register" class="fw-bold text-decoration-none me-3">
          Farmer Register
        </a>
        |
        <a routerLink="/signUp" class="fw-bold text-decoration-none ms-3">
          Customer Register
        </a>
      </div>

    </div>

  </div>

</div>
