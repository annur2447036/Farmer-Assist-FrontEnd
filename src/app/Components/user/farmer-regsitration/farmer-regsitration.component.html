<div class="container mt-5">
  <div class="card shadow-lg p-4 col-md-6 mx-auto">

    <h3 class="text-center text-success mb-4">🌿 Farmer Registration</h3>

    <form (ngSubmit)="registerFarmer()" #farmerForm="ngForm">

      <div class="mb-3">
        <label>Name</label>
        <input type="text" class="form-control"
               [(ngModel)]="farmer.name"
               name="name" required>
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control"
               [(ngModel)]="farmer.email"
               name="email" required>
      </div>

      <div class="mb-3">
        <label>Contact</label>
        <input type="number" class="form-control"
               [(ngModel)]="farmer.contact"
               name="contact" required>
      </div>

      <div class="mb-3">
        <label>Address</label>
        <input type="text" class="form-control"
               [(ngModel)]="farmer.address"
               name="address">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control"
               [(ngModel)]="farmer.password"
               name="password" required>
      </div>

      <button class="btn btn-success w-100" [disabled]="!farmerForm.valid">
        Register
      </button>

      <div class="text-center mt-3">
        <span>Already registered?</span>
        <a routerLink="/farmer-login" class="text-decoration-none fw-bold ms-1">
          Login here
        </a>
      </div>

    </form>

  </div>
</div>
